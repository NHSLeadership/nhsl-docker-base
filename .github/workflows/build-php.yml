name: Build PHPFPM Images

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nhsl-ubuntu-phpv2
  ORG: nhsleadership

jobs:
  build-php-fpm-exporter:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Create cache to store artifact
        uses: actions/cache@v4
        with:
          path: artifacts
          key: exporter-key

      - name: Checkout php-fpm_exporter repo
        uses: actions/checkout@v6
        with:
          repository: sysdiglabs/php-fpm_exporter

      - uses: actions/setup-go@v6
        with:
          go-version: '^1.23.0'

      - name: Build php-fpm exporter
        run: |
          mkdir -p artifacts
          go build -o artifacts/php-fpm_exporter

  build-php-image:
    runs-on: ubuntu-latest
    needs: build-php-fpm-exporter
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        php_version:
          - '7.2'
          - '7.3'
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
#          - '8.5'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore exporter cache
        uses: actions/cache/restore@v4
        with:
          path: artifacts
          key: exporter-key

      - name: Copy exporter artifact
        run: |
          mkdir -p phpfpm/rootfs/usr/local/bin/
          cp artifacts/php-fpm_exporter phpfpm/rootfs/usr/local/bin/

      - name: Get PHP modules list
        run: |
          PHP_SHORT=$(echo "${{ matrix.php_version }}" | tr -d '.')
          echo "PHP_MODS=$(awk '$1=$1' ORS=' ' ./phpfpm/php${PHP_SHORT}.txt)" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}

      # Build image locally first
      - name: Build PHP ${{ matrix.php_version }} image
        uses: docker/build-push-action@v7
        with:
          context: ./phpfpm
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ matrix.php_version }}-master
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            PHP_PACKAGES=${{ env.PHP_MODS }}

      # Generate SBOM
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ matrix.php_version }}-master
          format: spdx-json
          output-file: sbom-php${{ matrix.php_version }}.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-php${{ matrix.php_version }}
          path: sbom-php${{ matrix.php_version }}.spdx.json

      # Scan for vulnerabilities
      - name: Scan PHP ${{ matrix.php_version }} image with Grype
        id: grype
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ matrix.php_version }}-master
          output-format: sarif
          severity-cutoff: high
          only-fixed: true
          fail-build: false

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: phpfpm-${{ matrix.php_version }}

      # Push only after scan completes — only step that needs GITHUB_TOKEN
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push PHP ${{ matrix.php_version }} image
        run: docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ matrix.php_version }}-master
